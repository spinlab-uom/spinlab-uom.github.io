{{ define "main" }}
  <article class="pa3 pa4-ns nested-copy-line-height">
    <section class="cf ph3 ph5-l pv3 pv4-l f4 tc-l center measure-wide lh-copy {{ $.Param "text_color" | default "mid-gray" }}">
      {{ .Content }}
    </section>
    <style>
      .current-studies-container {
        max-width: 700px;
        margin: 0 auto;
      }
      .current-studies-card {
        max-width: 650px;
      }
    </style>
    <section class="current-studies-container flex flex-column items-center mt5">
      {{ range .Paginator.Pages }}
        <div class="current-studies-card relative w-100 w-70-l mb4 bg-white">
          {{ .Render "summary-with-image" }}
        </div>
      {{ end }}
    </section>
    {{ template "_internal/pagination.html" . }}
  </article>
{{ end }}
